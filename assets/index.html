<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Syslog Tool</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; display: flex; flex-direction: column; }
        header { background: #16213e; padding: 12px 20px; border-bottom: 1px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.2rem; color: #00d9ff; }
        .status { font-size: 0.85rem; color: #888; }
        .container { flex: 1; display: flex; flex-direction: column; padding: 10px; gap: 10px; max-height: calc(100vh - 60px); }
        .panel { background: #16213e; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
        .panel-header { padding: 10px 15px; background: #0f3460; font-size: 0.85rem; font-weight: 600; color: #00d9ff; display: flex; justify-content: space-between; }
        .log-display { flex: 1; overflow-y: auto; padding: 10px; }
        .log-entry { font-family: 'Consolas', 'Monaco', monospace; font-size: 0.8rem; padding: 6px 10px; border-bottom: 1px solid #0f3460; }
        .log-entry:last-child { border-bottom: none; }
        .log-entry .timestamp { color: #888; margin-right: 10px; }
        .log-entry .source { color: #00d9ff; margin-right: 10px; }
        .log-entry .message { color: #eee; }
        .info-panel { flex: 0 0 auto; min-height: 80px; }
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 15px; }
        .info-item { text-align: center; }
        .info-item .label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .info-item .value { font-size: 1.1rem; color: #00d9ff; margin-top: 4px; }
        button { background: #00d9ff; color: #1a1a2e; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
        button:hover { background: #00b8d4; }
        button.secondary { background: #0f3460; color: #00d9ff; }
        button.secondary:hover { background: #1a4a7a; }
        .empty { color: #666; font-style: italic; text-align: center; padding: 30px; }
        .sender-section { padding: 15px; border-top: 1px solid #0f3460; }
        .sender-form { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.7rem; color: #888; margin-bottom: 4px; }
        .form-group input { background: #0f3460; border: 1px solid #1a1a2e; color: #eee; padding: 6px 10px; border-radius: 4px; font-size: 0.85rem; width: 300px; }
        .form-group input:focus { outline: none; border-color: #00d9ff; }
    </style>

<body>
    <header>
        <h1>Syslog Tool</h1>
        <span class="status" id="status">Connecting...</span>
    </header>
    <div class="container">
        <div class="panel" style="flex:1;">
            <div class="panel-header">
                <span>Received Logs</span>
                <span id="log-count">0 logs</span>
            </div>
            <div class="log-display" id="log-display">
                <div class="empty">Waiting for syslog messages...</div>
            </div>
        </div>
        <div class="panel info-panel">
            <div class="panel-header">
                <span>Connection Info</span>
                <button class="secondary" onclick="saveLogs()" style="padding:4px 10px;font-size:0.75rem;">Save</button>
            </div>
            <div class="info-grid">
                <div class="info-item"><div class="label">Listener</div><div class="value" id="info-port">:514</div></div>
                <div class="info-item"><div class="label">Total</div><div class="value" id="info-total">0</div></div>
                <div class="info-item"><div class="label">Last Update</div><div class="value" id="info-last">-</div></div>
            </div>
            <div class="sender-section">
                <div class="sender-form">
                    <div class="form-group"><label>Dest IP</label><input type="text" id="dest-ip" placeholder="127.0.0.1" value="127.0.0.1"></div>
                    <div class="form-group"><label>Port</label><input type="number" id="dest-port" placeholder="514" value="514"></div>
                    <div class="form-group" style="flex:1;"><label>Message</label><input type="text" id="dest-msg" placeholder="Test message"></div>
                    <button onclick="sendMsg()">Send</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        let ws, logs = [], MAX = 20;
        function connect() {
            ws = new WebSocket('ws://' + location.host + '/ws');
            ws.onopen = () => document.getElementById('status').textContent = 'Connected';
            ws.onclose = () => { document.getElementById('status').textContent = 'Disconnected'; setTimeout(connect, 2000); };
            ws.onmessage = (e) => { addLog(JSON.parse(e.data)); };
        }
        function addLog(entry) {
            logs.unshift(entry); if (logs.length > MAX) logs.pop();
            document.getElementById('info-total').textContent = logs.length;
            document.getElementById('info-last').textContent = new Date(entry.timestamp).toLocaleTimeString();
            document.getElementById('log-count').textContent = logs.length + ' logs';
            render();
        }
        function render() {
            const d = document.getElementById('log-display');
            if (!logs.length) { d.innerHTML = '<div class="empty">Waiting...</div>'; return; }
            d.innerHTML = logs.map(l => '<div class="log-entry"><span class="timestamp">' + new Date(l.timestamp).toLocaleString() + '</span> <span class="source">' + l.source_ip + ':' + l.source_port + '</span> <span class="message">' + esc(l.message) + '</span></div>').join('');
        }
        function esc(t) { let d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
        function saveLogs() { window.location.href = '/save'; }
        async function sendMsg() {
            let m = document.getElementById('dest-msg').value;
            if (!m) return;
            await fetch('/api/send', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ dest_ip: document.getElementById('dest-ip').value, dest_port: parseInt(document.getElementById('dest-port').value), message: m }) });
            
        }
        document.getElementById('dest-msg').addEventListener('keypress', e => { if (e.key === 'Enter') sendMsg(); });
        fetch('/api/info').then(r => r.json()).then(i => { document.getElementById('info-port').textContent = ':' + i.listening_port; document.getElementById('info-total').textContent = i.total_received; if (i.last_update) document.getElementById('info-last').textContent = new Date(i.last_update).toLocaleTimeString(); });
        connect();
    </script>
</body>
</html>
